<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screen Saver</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  .layer {
    position: fixed; inset: 0;
    background-color: #000;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
  }
  .layer.show { opacity: 1; }

  .info {
    position: fixed; left: 50%; bottom: 32px;
    transform: translateX(-50%);
    max-width: min(80%, 1200px);
    padding: 12px 22px;
    color: #fff;
    font-size: 15px;
    text-align: center;
    text-shadow: 0 1px 6px rgba(0,0,0,.9);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(6px);
    border-radius: 10px;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
  }
  .info.show { opacity: 1; }
  .info .date { color: #ffd479; margin-right: 12px; font-weight: 500; }

  .status {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #555; font-size: 13px;
  }
  .status.hide { display: none; }

  body.idle { cursor: none; }

  /* 状态指示 — 调试用 */
  .tick {
    position: fixed; top: 16px; left: 16px;
    color: rgba(255,255,255,.25); font-size: 11px;
    font-family: monospace;
    z-index: 999; pointer-events: none;
    opacity: 0; transition: opacity .5s;
  }
  .tick.show { opacity: 1; }

  /* 全屏提示 — 点击后消失 */
  .fs-hint {
    position: fixed; top: 16px; right: 16px;
    color: rgba(255,255,255,.5); font-size: 12px;
    background: rgba(0,0,0,.3);
    padding: 6px 12px; border-radius: 6px;
    opacity: 1; transition: opacity .8s;
    z-index: 999; pointer-events: none;
  }
  .fs-hint.hide { opacity: 0; }
</style>
</head>
<body class="idle">

<div id="bg1" class="layer"></div>
<div id="bg2" class="layer"></div>
<div id="info" class="info"></div>
<div id="loading" class="status">加载壁纸…</div>
<div id="error" class="status" style="color:#888;display:none"></div>
<div id="tick" class="tick"></div>
<div id="fs-hint" class="fs-hint">点击进入全屏</div>

<script>
(() => {
  const P = new URLSearchParams(location.search);
  const INTERVAL = Math.max(5, parseInt(P.get('interval')) || 600) * 1000;  // 切换间隔（秒）
  const REGION = P.get('region') || '';                                    // 指定存档区域时仅拉取该区域（CN-zh / US-en / JP-ja…）
  const LIMIT = Math.max(1, parseInt(P.get('count')) || 0);               // 0=全部
  const FADE = Math.max(0, parseInt(P.get('fade')) || 1500);              // 淡入淡出（ms）
  const INFO_MS = parseInt(P.get('info_ms')) || 8000;                     // 版权浮层显示时长（ms）
  const SHOW_INFO = P.get('info') !== '0';
  const CURSOR_IDLE = parseInt(P.get('cursor_idle')) || 5000;             // 隐藏光标闲置时间（ms）
  const NO_FS = P.get('nofs') === '1';                                    // 1=禁用全屏请求

  const bg = [document.getElementById('bg1'), document.getElementById('bg2')];
  const infoEl = document.getElementById('info');
  const loadEl = document.getElementById('loading');
  const errEl = document.getElementById('error');
  const fsHint = document.getElementById('fs-hint');
  const tickEl = document.getElementById('tick');
  let active = 0, idx = 0, timer = null, infoTimer = null, images = [];
  let tickCount = 0;

  // ── 设置过渡时间（CSS 和 JS 同步）──
  bg.forEach(el => el.style.transitionDuration = FADE + 'ms');

  // ── 自动全屏（首次交互）──
  if (!NO_FS && !document.fullscreenElement) {
    const enterFs = () => {
      document.documentElement.requestFullscreen().catch(() => {});
      fsHint.classList.add('hide');
    };
    // 第一次点击/按键即全屏
    document.addEventListener('click', enterFs, { once: true });
    document.addEventListener('keydown', enterFs, { once: true });
    // 如果已经全屏则隐藏提示
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) fsHint.classList.add('hide');
    }, { once: true });
  } else {
    fsHint.classList.add('hide');
  }

  // ── 数据源：bing.npanuhin.me 完整存档（12 个地区，数千张壁纸）──
  // 默认拉取全部地区合并去重；?region=CN-zh 可指定单一区域
  const ALL_REGIONS = [
    'CN-zh','US-en','JP-ja','GB-en','DE-de','FR-fr',
    'IT-it','ES-es','BR-pt','IN-en','CA-en','CA-fr',
  ];

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.random() * (i + 1) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // 从 bing_url 提取唯一图片名（如 OHR.KilchurnAutumn），用于跨区去重
  function imageKey(img) {
    const m = (img.bing_url || '').match(/id=OHR\.([^_]+)/);
    return m ? m[1] : img.date || img.url || '';
  }

  async function fetchImages() {
    const regions = REGION ? [REGION] : ALL_REGIONS;
    const failures = [];

    // 并行拉取所有地区
    const results = await Promise.allSettled(
      regions.map(r =>
        fetch(`https://bing.npanuhin.me/${r}.json`, { cache: 'no-store' })
          .then(res => { if (!res.ok) throw new Error(`${r} HTTP ${res.status}`); return res.json(); })
          .then(data => { if (!Array.isArray(data) || !data.length) throw new Error(`${r} 空数据`); return data; })
      )
    );

    // 合并去重
    const seen = new Set();
    let all = [];
    for (const r of results) {
      if (r.status === 'fulfilled') {
        for (const img of r.value) {
          const key = imageKey(img);
          if (!seen.has(key)) { seen.add(key); all.push(img); }
        }
      } else {
        failures.push(r.reason?.message || '未知错误');
      }
    }

    if (all.length) {
      shuffle(all);
      // 暴露图片数量用于调试
      window.__ssCount = all.length;
      return LIMIT > 0 ? all.slice(0, LIMIT) : all;
    }

    throw new Error('壁纸加载失败: ' + failures.join('; '));
  }

  function imageUrl(img) {
    // npanuhin.me CDN 在国内可直接访问，bing.com 可能被墙
    window.__ssUrl = img.url || img.bing_url || '';
    return window.__ssUrl;
  }

  function applyBg(el, url) {
    el.style.backgroundImage = 'url("' + url.replace(/"/g, '\\"') + '")';
  }

  function showAt(i) {
    window.__ssIdx = i;
    if (!images.length) return;
    const img = images[((i % images.length) + images.length) % images.length];
    const url = imageUrl(img);
    const next = 1 - active;

    const imgLoader = new Image();
    imgLoader.onload = () => {
      applyBg(bg[next], url);
      bg[next].classList.add('show');
      bg[active].classList.remove('show');
      active = next;
    };
    imgLoader.onerror = () => setTimeout(() => showAt(i + 1), 5000);
    imgLoader.src = url;

    // 显示版权信息
    if (SHOW_INFO) {
      const date = img.date || '';
      const cp = (img.copyright || img.title || '').trim();
      const html = (date ? `<span class="date">${date}</span>` : '') + (cp ? `<span>${cp}</span>` : '');
      if (html) {
        infoEl.innerHTML = html;
        infoEl.classList.add('show');
        clearTimeout(infoTimer);
        infoTimer = setTimeout(() => infoEl.classList.remove('show'), INFO_MS);
      }
    }
  }

  function next() { idx++; showAt(idx); }
  function prev() { idx--; showAt(idx); }

  function nextAuto() { idx++; showAt(idx); updateTick('⏱'); }
  function nextKey()  { idx++; showAt(idx); updateTick('→'); }
  function prevKey()  { idx--; showAt(idx); updateTick('←'); }

  // ── 状态更新 ──
  function updateTick(src) {
    tickCount++;
    const intSec = Math.round(INTERVAL / 1000);
    tickEl.textContent = `${src} #${idx} (${tickCount}) interval=${intSec}s`;
    tickEl.classList.add('show');
    clearTimeout(tickEl._hide);
    tickEl._hide = setTimeout(() => tickEl.classList.remove('show'), 6000);
  }

  // ── 键盘快捷键：← 上一张  → 下一张（测试用）──
  // 全屏 keydown 是 { once: true }，不影响这里
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); nextKey(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); prevKey(); }
  });

  // ── 启动 ──
  (async () => {
    try {
      images = await fetchImages();
      loadEl.classList.add('hide');
      showAt(0); updateTick('✓');
      timer = setInterval(nextAuto, INTERVAL);
    } catch (e) {
      loadEl.classList.add('hide');
      errEl.style.display = 'flex';
      errEl.textContent = '壁纸加载失败: ' + e.message;
    }
  })();

  // ── 鼠标闲置隐藏光标 ──
  let curTimer = null;
  document.addEventListener('mousemove', () => {
    document.body.classList.remove('idle');
    clearTimeout(curTimer);
    curTimer = setTimeout(() => document.body.classList.add('idle'), CURSOR_IDLE);
  }, { passive: true });
})();
</script>
</body>
</html>
