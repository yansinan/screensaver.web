<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>天气面板</title>
<link rel="stylesheet" href="style.css">
<style>
  html, body { margin:0; padding:0; height:100%; background:transparent; overflow:hidden; }
  body { display:flex; align-items:flex-start; justify-content:flex-end; padding:24px; box-sizing:border-box; }

  /* ── 天气面板（独立模块）── */
  .weather {
    min-width: 220px;
    padding: 18px 22px 14px;
    color: var(--text-primary);
    user-select: none;
  }

  .weather .now {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }
  .weather .now .icon { font-size: 40px; line-height:1; flex-shrink:0; }
  .weather .now .temp {
    font-size: 48px; font-weight:300; letter-spacing:-2px; line-height:1;
  }
  .weather .now .temp .unit { font-size:20px; font-weight:300; vertical-align:super; margin-left:2px; }
  .weather .now .desc  { font-size:13px; font-weight:400; color:var(--text-secondary); margin-top:2px; }

  .weather .detail {
    display: flex; gap: 16px;
    font-size: 12px; color: var(--text-tertiary);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-glass);
  }

  .weather .daily {
    display: flex; justify-content: space-between;
  }
  .weather .daily .day { text-align:center; flex:1; }
  .weather .daily .day .name  { font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
  .weather .daily .day .d-icon { font-size:20px; margin-bottom:2px; }
  .weather .daily .day .d-temp { font-size:13px; font-weight:400; }
  .weather .daily .day .d-temp .hi { color:var(--text-primary); }
  .weather .daily .day .d-temp .lo { color:var(--text-tertiary); margin-left:4px; }

  .weather.loading .now .temp { opacity:.3; }
  .weather.loading .daily { opacity:.3; }
</style>
</head>
<body>
<div class="weather glass" id="weather">
  <div class="now">
    <div class="icon" id="w-icon">☀️</div>
    <div>
      <div class="temp" id="w-temp">--<span class="unit">°</span></div>
      <div class="desc" id="w-desc">加载中</div>
    </div>
  </div>
  <div class="detail">
    <span id="w-feel">体感 --°</span>
    <span id="w-humid">💧 --%</span>
    <span id="w-wind">💨 -- km/h</span>
  </div>
  <div class="daily" id="w-daily">
    <div class="day"><div class="name">今天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
    <div class="day"><div class="name">明天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
    <div class="day"><div class="name">后天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
  </div>
</div>

<script>
// ── WMO 天气码 → 图标 + 中文描述 ──
const WMO = {
  0:['☀️','晴'],1:['🌤️','少云'],2:['⛅','多云'],3:['☁️','阴'],
  45:['🌫️','雾'],48:['🌫️','雾凇'],
  51:['🌦️','小毛毛雨'],53:['🌦️','毛毛雨'],55:['🌦️','大毛毛雨'],
  56:['🌧️','冻毛毛雨'],57:['🌧️','冻毛毛雨'],
  61:['🌦️','小雨'],63:['🌧️','中雨'],65:['🌧️','大雨'],
  66:['🌧️','冻雨'],67:['🌧️','冻雨'],
  71:['🌨️','小雪'],73:['🌨️','中雪'],75:['🌨️','大雪'],77:['❄️','雪粒'],
  80:['🌦️','阵雨'],81:['🌧️','中阵雨'],82:['🌧️','大阵雨'],
  85:['🌨️','小阵雪'],86:['🌨️','大阵雪'],
  95:['⛈️','雷暴'],96:['⛈️','雷暴+冰雹'],99:['⛈️','雷暴+冰雹'],
};
const WEEKDAY = ['周日','周一','周二','周三','周四','周五','周六'];

async function fetchWeather() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code&forecast_days=3&timezone=Asia/Shanghai`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function renderWeather(d, el) {
  const cur = d.current;
  const daily = d.daily;
  const [icon, desc] = WMO[cur.weather_code] || ['🌈','未知'];

  el.querySelector('#w-icon').textContent = icon;
  el.querySelector('#w-temp').innerHTML = Math.round(cur.temperature_2m) + '<span class="unit">°</span>';
  el.querySelector('#w-desc').textContent = desc;
  el.querySelector('#w-feel').textContent = `体感 ${Math.round(cur.apparent_temperature)}°`;
  el.querySelector('#w-humid').textContent = `💧 ${cur.relative_humidity_2m}%`;
  el.querySelector('#w-wind').textContent = `💨 ${cur.wind_speed_10m} km/h`;

  const days = el.querySelectorAll('#w-daily .day');
  const today = new Date();
  for (let i = 0; i < 3; i++) {
    const day = days[i]; if (!day) continue;
    const [dIcon, dDesc] = WMO[daily.weather_code[i]] || ['🌈',''];
    day.querySelector('.name').textContent = i === 0 ? '今天' : i === 1 ? '明天' : WEEKDAY[(today.getDay() + i) % 7];
    day.querySelector('.d-icon').textContent = dIcon;
    day.querySelector('.hi').textContent = Math.round(daily.temperature_2m_max[i]) + '°';
    day.querySelector('.lo').textContent = Math.round(daily.temperature_2m_min[i]) + '°';
  }
  el.classList.remove('loading');
}

// 自动初始化
const el = document.getElementById('weather');
fetchWeather().then(d => renderWeather(d, el)).catch(() => { el.querySelector('#w-desc').textContent = '暂无数据'; el.classList.remove('loading'); });
setInterval(() => fetchWeather().then(d => renderWeather(d, el)).catch(() => {}), 30 * 60 * 1000);
</script>
</body>
</html>
