<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>天气壁纸</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
  }
  .layer {
    position: fixed; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
  }
  .layer.show { opacity: 1; }
  .layer.fade { opacity: 0; }

  /* ── 天气面板：iOS/macOS 极简风格 ── */
  .weather {
    position: fixed; top: 24px; right: 24px;
    min-width: 240px;
    padding: 20px 24px 16px;
    color: #fff;
    background: rgba(0,0,0,.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    box-shadow: 0 4px 30px rgba(0,0,0,.3);
    z-index: 10;
    user-select: none;
  }

  /* 当前天气 */
  .weather .now {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .weather .now .icon {
    font-size: 44px;
    line-height: 1;
    flex-shrink: 0;
  }
  .weather .now .temp {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -2px;
    line-height: 1;
  }
  .weather .now .temp .unit {
    font-size: 22px;
    font-weight: 300;
    vertical-align: super;
    margin-left: 2px;
  }
  .weather .now .desc {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,.8);
    margin-top: 2px;
  }

  /* 细节行 */
  .weather .detail {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: rgba(255,255,255,.65);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,.12);
  }
  .weather .detail span { white-space: nowrap; }

  /* 3天预报 */
  .weather .daily {
    display: flex;
    justify-content: space-between;
  }
  .weather .daily .day {
    text-align: center;
    flex: 1;
  }
  .weather .daily .day .name {
    font-size: 12px;
    color: rgba(255,255,255,.6);
    margin-bottom: 4px;
  }
  .weather .daily .day .d-icon {
    font-size: 22px;
    margin-bottom: 2px;
  }
  .weather .daily .day .d-temp {
    font-size: 13px;
    font-weight: 400;
  }
  .weather .daily .day .d-temp .hi { color: #fff; }
  .weather .daily .day .d-temp .lo { color: rgba(255,255,255,.5); margin-left: 4px; }

  /* 加载状态 */
  .loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.3); font-size: 13px; z-index: 20;
  }
  .loading.hide { display: none; }

  body.idle { cursor: none; }
</style>
</head>
<body class="idle">

<div id="bg" class="layer show"></div>
<div class="loading" id="loading">加载天气…</div>

<div class="weather" id="weather" style="display:none">
  <div class="now">
    <div class="icon" id="w-icon">☀️</div>
    <div>
      <div class="temp" id="w-temp">--<span class="unit">°</span></div>
      <div class="desc" id="w-desc">获取中</div>
    </div>
  </div>
  <div class="detail">
    <span id="w-feel">体感 --°</span>
    <span id="w-humid">💧 --%</span>
    <span id="w-wind">💨 -- km/h</span>
  </div>
  <div class="daily" id="w-daily">
    <div class="day"><div class="name">今天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
    <div class="day"><div class="name">明天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
    <div class="day"><div class="name">后天</div><div class="d-icon">☀️</div><div class="d-temp"><span class="hi">--°</span><span class="lo">--°</span></div></div>
  </div>
</div>

<script>
(() => {
  const LAT = 39.9042, LON = 116.4074;
  const REFRESH_MS = 30 * 60 * 1000;  // 30 分钟

  const bgEl = document.getElementById('bg');
  const loadEl = document.getElementById('loading');
  const wxEl = document.getElementById('weather');

  // 壁纸索引，防止每次刷新都换图
  let bgIdx = +(localStorage.getItem('wx_bg_idx') || 0);

  // ── WMO 天气码 → 图标 + 中文描述 ──
  const WMO = {
    0:  ['☀️', '晴'],
    1:  ['🌤️', '少云'],
    2:  ['⛅', '多云'],
    3:  ['☁️', '阴'],
    45: ['🌫️', '雾'],
    48: ['🌫️', '雾凇'],
    51: ['🌦️', '小毛毛雨'],
    53: ['🌦️', '毛毛雨'],
    55: ['🌦️', '大毛毛雨'],
    56: ['🌧️', '冻毛毛雨'],
    57: ['🌧️', '冻毛毛雨'],
    61: ['🌦️', '小雨'],
    63: ['🌧️', '中雨'],
    65: ['🌧️', '大雨'],
    66: ['🌧️', '冻雨'],
    67: ['🌧️', '冻雨'],
    71: ['🌨️', '小雪'],
    73: ['🌨️', '中雪'],
    75: ['🌨️', '大雪'],
    77: ['❄️', '雪粒'],
    80: ['🌦️', '阵雨'],
    81: ['🌧️', '中阵雨'],
    82: ['🌧️', '大阵雨'],
    85: ['🌨️', '小阵雪'],
    86: ['🌨️', '大阵雪'],
    95: ['⛈️', '雷暴'],
    96: ['⛈️', '雷暴+冰雹'],
    99: ['⛈️', '雷暴+冰雹'],
  };
  function wxInfo(code) { return WMO[code] || ['🌈', '未知']; }

  // ── 星期名 ──
  const WEEKDAY = ['周日','周一','周二','周三','周四','周五','周六'];

  // ── 获取天气 ──
  async function fetchWeather() {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${LAT}&longitude=${LON}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m`
      + `&daily=temperature_2m_max,temperature_2m_min,weather_code`
      + `&forecast_days=3&timezone=Asia/Shanghai`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function renderWeather(d) {
    const cur = d.current;
    const daily = d.daily;
    const [icon, desc] = wxInfo(cur.weather_code);

    // 当前
    document.getElementById('w-icon').textContent = icon;
    document.getElementById('w-temp').innerHTML = Math.round(cur.temperature_2m) + '<span class="unit">°</span>';
    document.getElementById('w-desc').textContent = desc;
    document.getElementById('w-feel').textContent = `体感 ${Math.round(cur.apparent_temperature)}°`;
    document.getElementById('w-humid').textContent = `💧 ${cur.relative_humidity_2m}%`;
    document.getElementById('w-wind').textContent = `💨 ${cur.wind_speed_10m} km/h`;

    // 3 天预报
    const days = document.querySelectorAll('#w-daily .day');
    const today = new Date();
    for (let i = 0; i < 3; i++) {
      const dayEl = days[i];
      if (!dayEl) continue;
      const [dIcon, dDesc] = wxInfo(daily.weather_code[i]);
      const name = i === 0 ? '今天' : i === 1 ? '明天' : WEEKDAY[(today.getDay() + i) % 7];
      dayEl.querySelector('.name').textContent = name;
      dayEl.querySelector('.d-icon').textContent = dIcon;
      dayEl.querySelector('.hi').textContent = Math.round(daily.temperature_2m_max[i]) + '°';
      dayEl.querySelector('.lo').textContent = Math.round(daily.temperature_2m_min[i]) + '°';
    }

    wxEl.style.display = 'block';
  }

  // ── 加载壁纸 ──
  async function loadBg() {
    try {
      const r = await fetch('https://bing.npanuhin.me/CN-zh.json');
      const imgs = await r.json();
      if (Array.isArray(imgs) && imgs.length) {
        bgIdx = (bgIdx + 1) % imgs.length;
        localStorage.setItem('wx_bg_idx', bgIdx);
        const img = imgs[bgIdx];
        const url = img.url || img.bing_url || '';
        if (url) {
          bgEl.style.backgroundImage = `url("${url.replace(/"/g,'\\"')}")`;
        }
      }
    } catch (e) {
      // 壁纸加载失败不阻塞天气
    }
  }

  // ── 启动 ──
  (async () => {
    // 先加载壁纸
    await loadBg();

    // 首次获取天气
    try {
      const data = await fetchWeather();
      renderWeather(data);
      loadEl.classList.add('hide');
    } catch (e) {
      loadEl.textContent = '天气加载失败';
    }

    // 每 30 分钟刷新天气
    setInterval(async () => {
      try {
        const data = await fetchWeather();
        renderWeather(data);
      } catch (e) {
        // 静默失败，下次继续
      }
    }, REFRESH_MS);

    // 壁纸每 30 分钟同步换一张
    setInterval(loadBg, REFRESH_MS);

    // 也支持手动换壁纸（点击图片区域）
    document.addEventListener('click', (e) => {
      if (e.target.closest('.weather')) return;  // 点击天气面板不换
      loadBg();
    });
  })();

  // ── 鼠标闲置隐藏光标 ──
  let curTimer = null;
  document.addEventListener('mousemove', () => {
    document.body.classList.remove('idle');
    clearTimeout(curTimer);
    curTimer = setTimeout(() => document.body.classList.add('idle'), 5000);
  }, { passive: true });
})();
</script>
</body>
</html>
